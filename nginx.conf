# This file should be pasted into Coolify's "Custom Nginx Configuration" setting
# Location: Application > Settings > Custom Nginx Configuration
#
# This replaces the default nginx config and adds HTTP security headers
# plus fixes 404 page handling.

server {
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri.html $uri/ =404;
    }

    # 404 handling - serves 404.html with 404 status code (correct for SEO)
    error_page 404 /404.html;

    # 5xx error handling
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    # HTTP Security Headers
    # Enforce HTTPS and prevent downgrade attacks
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Prevent clickjacking attacks
    add_header X-Frame-Options "DENY" always;

    # Prevent MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Cross-Origin-Opener-Policy for origin isolation
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # Referrer Policy for privacy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content Security Policy
    # - default-src 'self': restrict to same-origin by default
    # - style-src 'unsafe-inline': required for inline <style> blocks in layout.liquid and per-post styles
    # - script-src 'unsafe-inline': required for inline <script type="application/ld+json"> blocks
    # - img-src allows data: URIs (favicon) and https: (future images)
    # - frame-ancestors 'none': prevents embedding in frame/iframe (clickjacking)
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data: https:; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self';" always;
}
